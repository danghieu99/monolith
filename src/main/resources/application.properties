#db
spring.datasource.url=jdbc:mysql://localhost:3306/ecom?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#orm
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace
#thymeleaf
spring.thymeleaf.cache=false
#custom port
server.port=3000
#redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.username=default
#jwt
com.danghieu99.monolith.jwt.cookie-path=/api/v1
com.danghieu99.monolith.jwt.token-issuer=danghieu99
com.danghieu99.monolith.jwt.token-secret-key=org.danghieu99.monolith.jwt.secretKey
com.danghieu99.monolith.jwt.access-token-name=access
#com.danghieu99.monolith.jwt.access-token-expire-ms=300000
com.danghieu99.monolith.jwt.access-token-expire-ms=0
com.danghieu99.monolith.jwt.refresh-token-name=refresh
#com.danghieu99.monolith.jwt.refresh-token-expire-ms=43200000
com.danghieu99.monolith.jwt.refresh-token-expire-ms=10000
